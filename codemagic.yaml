
workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Install dependencies
        script: |
          cd piggy-feast
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
      - name: Capacitor Build
        script: |
          cd piggy-feast
          # Tạo thư mục www nếu chưa có
          mkdir -p www
          cp index.html www/
          # Khởi tạo và tạo file dự án Xcode
          npx cap init "Piggy Feast" com.quyet.piggyfeast --web-dir www || true
          npx cap add ios || true
          npx cap copy
          # Lệnh quan trọng để tạo file IPA
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -allowProvisioningUpdates build
    artifacts:
      - piggy-feast/ios/App/Build/Products/Debug-iphoneos/*.app
      - piggy-feast/ios/App/*.ipa
    publishing:
      email:
        recipients:
          - daovanquyet231995@gmail.com
