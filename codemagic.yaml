
workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Install dependencies
        script: |
          cd piggy-feast
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
      - name: Preparing Web Folder
        script: |
          cd piggy-feast
          mkdir -p www
          cp index.html www/
      - name: Capacitor Build
        script: |
          cd piggy-feast
          # Xóa sạch làm lại từ đầu để tránh lỗi tồn đọng
          rm -rf ios
          npx cap init "Piggy Feast" com.quyet.piggyfeast --web-dir www --path .
          npx cap add ios
          npx cap copy
          # Lệnh xây dựng với đường dẫn tuyệt đối để máy chủ không thể lạc đường
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Debug -sdk iphoneos -allowProvisioningUpdates build
    artifacts:
      - "**/Build/Products/Debug-iphoneos/*.app"
      - "**/ios/App/*.ipa"
      - "**/ios/App/App.xcarchive"
    publishing:
      email:
        recipients:
          - daovanquyet231995@gmail.com
