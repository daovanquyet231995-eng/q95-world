workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Capacitor Build
        script: |
          npx cap add ios
          npx cap copy
    artifacts:
      - ios/App/App.xcarchive
      - ios/App/App.ipa
    publishing:
      email:
        recipients:
          - your-email@gmail.com # Thay email của bạn vào đây
