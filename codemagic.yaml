
workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Install dependencies
        script: |
          cd piggy-feast
          npm install
      - name: Capacitor Build
        script: |
          cd piggy-feast
          npx cap add ios || true
          npx cap copy
          npx cap update
    artifacts:
      - piggy-feast/ios/App/*.ipa
      - piggy-feast/ios/App/App.xcarchive
    publishing:
      email:
        recipients:
          - daovanquyet231995@gmail.com
